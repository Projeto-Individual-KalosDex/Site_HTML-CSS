<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style/style.css">
    <title>Login</title>
</head>

<body>
    <header class="header">
        <div class="header-esquerda">
            <img src="../../style/imagens/logo_KalosDex-semfundo.png" class="logo">
            <h3 class="texto_logo">KalosDex</h3>
        </div>

        <nav class="menulogin">
            <a href="../../páginas/home/index.html">Home</a>
        </nav>

        <div class="header-direita">
            <a href="../cadastro/cadastro.html" class="botao-cadastro">Cadastro</a>
        </div>
    </header>

    <h2 class="titulocadastrologin">Login</h2>

    <main class="conteudocadastrologin">

        <div class="containerloginecadastro">

            <span>Email:</span> <br>
            <input type="email" id="ipt_email" placeholder="email@provedor.com"> <br>

            <span>Senha:</span> <br>
            <div class="input_senha">
                <input type="password" id="ipt_senha" placeholder="*****">
                <button onclick="mostrarSenha()" class="botao_versenha">Mostrar Senha</button> <br>
            </div>

            <button onclick="entrar()" class="botao_cadastrologin">Entrar</button>
        </div>
    </main>
    <footer class="footer">

        <div class="footer_conteudo">
            <h2>KalosDex</h2>

            <div class="footer_links">
                <a href="../../páginas/home/index.html">Home</a>
            </div>
        </div>

        <div class="footer_baixo">
            <p>© 2026 KalosDex - Projeto Individual</p>
        </div>

    </footer>


</body>
<script>
    function entrar() {

    }
    function mostrarSenha() {
        var senha = document.getElementById("ipt_senha");

        if (senha.type == "password") {
            senha.type = "text";
        } else {
            senha.type = "password";
        }
    }
</script>

</html>
