<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../style/style.css">
    <title>Cadastrar-se</title>
</head>

<body>
    <header class="header">
        <div class="header-esquerda">
            <img src="../../style/imagens/logo_KalosDex-semfundo.png" class="logo">
            <h3 class="texto_logo">KalosDex</h3>
        </div>

        <nav class="menucadastro">
            <a href="../../páginas/home/index.html">Home</a>
        </nav>

        <div class="header-direita">
            <a href="../login/login.html" class="botao-login">Login</a>
        </div>
    </header>
    <h2 class="titulocadastrologin">Monte seu Perfil de Treinador</h2>

    <main class="conteudocadastrologin">

        <div class="containerimagem">
            <h2 class="texto_imagem">Bem-vindo à <div style="color: #d4af37;">Kalos</div>
            </h2>

            <img src="../../style/imagens/lumiosecity.jpg" class="imagem_questionario">
        </div>

        <div class="containerloginecadastro">

            <span>Nome do Treinador:</span> <br>
            <input type="text" id="ipt_nometreinador" placeholder="Nome do seu Treinador"> <br>

            <span>Pokémon Favorito de Kalos:</span> <br>
            <select class="select_favorito" id="ipt_favorito">
                <option value="0">Selecione um Pokémon</option>
            </select> <br>

            <span>Tipo Favorito:</span> <br>
            <select id="select_tipo">
                <option>Normal</option>
                <option>Fogo</option>
                <option>Água</option>
                <option>Planta</option>
                <option>Elétrico</option>
                <option>Gelo</option>
                <option>Lutador</option>
                <option>Veneno</option>
                <option>Terrestre</option>
                <option>Voador</option>
                <option>Psíquico</option>
                <option>Inseto</option>
                <option>Pedra</option>
                <option>Fantasma</option>
                <option>Dragão</option>
                <option>Sombrio</option>
                <option>Aço</option>
                <option>Fada</option>
            </select> <br>


            <span>Inicial escolhido:</span> <br>
            <select id="select_inicial">
                <option value="">Selecione um inicial</option>
                <option>Chespin</option>
                <option>Fennekin</option>
                <option>Froakie</option>
            </select> <br>


            <span>Time ideal:</span> <br>
            <select class="select_time" id="time_1">
                <option value="0">Pokémon 1</option>
            </select>

            <select class="select_time" id="time_2">
                <option value="0">Pokémon 2</option>
            </select>

            <select class="select_time" id="time_3">
                <option value="0">Pokémon 3</option>
            </select>

            <select class="select_time" id="time_4">
                <option value="0">Pokémon 4</option>
            </select>

            <select class="select_time" id="time_5">
                <option value="0">Pokémon 5</option>
            </select>

            <select class="select_time" id="time_6">
                <option value="0">Pokémon 6</option>
            </select> <br>

            <button onclick="cadastrar()" class="botao_cadastrologin">Cadastrar</button>
        </div>
    </main>

    <footer class="footer">

        <div class="footer_conteudo">
            <h2>KalosDex</h2>

            <div class="footer_links">
                <a href="../../páginas/home/index.html">Home</a>
            </div>
        </div>

        <div class="footer_baixo">
            <p>© 2026 KalosDex - Projeto Individual</p>
        </div>

    </footer>

</body>
<script src="../pokemon.js"></script>
<script>

    var selectsFavorito = document.querySelectorAll(".select_favorito");
    var selectsTime = document.querySelectorAll(".select_time");

    for (let i = 0; i < selectsTime.length; i++) {

        for (let j = 0; j < pokemonsXY.length; j++) {

            selectsTime[i].innerHTML += `
        <option>${pokemonsXY[j]}</option>
        `;
        }
    }

    for (let i = 0; i < selectsFavorito.length; i++) {

        for (let j = 0; j < pokemonsKalos.length; j++) {

            selectsFavorito[i].innerHTML += `
        <option>${pokemonsKalos[j]}</option>
        `;
        }
    }

    function cadastrar() {
        var nome = ipt_nome.value;
        var email = ipt_email.value;
        var senha = ipt_senha.value;
        var senhaconfirmacao = ipt_senhaconfirmacao.value;
        var erro = false;
        if (nome == "" ||
            email == "" ||
            senha == "" ||
            senhaconfirmacao == "") {
            alert('Todos os Campos devem estar preenchidos')
            erro = true;
        }
        if (nome.length > 50) {
            alert('Nome longo demais')
            erro = true;
        }
        if (email.indexOf('@') == -1) {
            alert('Email Inválido')
            erro = true
        }
        if (email.length == 50) {
            alert('Email longo demais')
            erro = true
        }
        if (senha != senhaconfirmacao) {
            alert('Senha e confirmação diferentes')
            erro = true
        }
        if (erro == false) {
            window.location.href = "cadastro_questionario.html";
        }
    }



</script>

</html>
